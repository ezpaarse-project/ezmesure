{% macro render(id, title, description, height, width, theta, color, data) %}
<div class="card h-100 align-middle">
  <div class="card-body align-items-center">
    <h5 id="donut-{{ id }}" class="card-title">Diagram {{ title }}</h5>
    <div id="{{ id }}"></div>
  </div>
</div>
<script>
  window.addEventListener('load', () => {
    vegaEmbed(
      '#{{ id }}',
      {
        "$schema": "https://vega.github.io/schema/vega-lite/v5.json",
        "description": {{ description | dump | safe }},
        "width": document.querySelector('#donut-{{ id }}').clientWidth,
        "height": document.querySelector('#donut-{{ id }}').clientHeight,
        "padding": 5,
        "autosize": "fit-x",
        "data": {{ data | dump | safe }},
        "encoding": {
          "theta": { "field": {{ theta | dump | safe }}, "type": "quantitative", "stack": true },
          "color": { "field": {{ color | dump | safe }}, "type": "nominal", "legend": { "direction": "vertical", "title": {{ title | dump | safe }} } }
        },
        "layer": [{
          "mark": { "type": "arc", "radius": 150, "radius2": 200 },
        }, {
          "mark": {"type": "text", "radius": 220 },
          "encoding": {
            "text": {"field": "percent", "type": "nominal"}
          }
        }],
        "view": { "stroke": null }
      },
      { actions: false }
    );
  });
</script>
{% endmacro %}
