{% macro render(id, title, description, height, width, theta, color, data) %}
<div class="card h-100">
  <div class="card-body" id="donut-card-{{ id }}">
    <h5 class="card-title">Diagram {{ title }}</h5>
    <p class="card-text">
      <div id="{{ id }}" style="width: 100%"></div>
    </p>
  </div>
</div>
<script>
  window.addEventListener('load', () => {
    vegaEmbed(
      '#{{ id }}',
      {
        "$schema": "https://vega.github.io/schema/vega-lite/v5.json",
        "description": {{ description | dump | safe }},
        "width": "container",
        "height": document.querySelector('#donut-card-{{ id }}').clientHeight,
        "padding": 5,
        "autosize": {
          "type": "fit-x",
        },
        "data": {{ data | dump | safe }},
        "encoding": {
          "theta": { "field": {{ theta | dump | safe }}, "type": "quantitative", "stack": true },
          "color": { "field": {{ color | dump | safe }}, "type": "nominal", "legend": { "direction": "vertical", "orient": "right", "title": {{ title | dump | safe }} } }
        },
        "layer": [{
          "mark": { "type": "arc", "innerRadius": document.querySelector('#donut-card-{{ id }}').clientWidth/4, "outerRadius": document.querySelector('#donut-card-{{ id }}').clientWidth/4 + 20 },
        }, {
          "mark": {"type": "text", "radius": 225 }, 
          "encoding": {
            "text": {"field": "percent", "type": "nominal"}
          }
        }],
        "view": { "stroke": null }
      },
      { actions: false }
    );
  });
</script>
{% endmacro %}
