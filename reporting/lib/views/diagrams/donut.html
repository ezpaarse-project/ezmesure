{% macro render(params) %}
<div class="card h-100">
  <div class="card-body" id="donut-card-{{ params.id }}">
    <h5 class="card-title">Diagram {{ params.title }}</h5>
    <div class="card-text">
      <div id="{{ params.id }}" style="width: 100%; height: 100%"></div>
    </div>
  </div>
</div>
<script>
  window.addEventListener('load', () => {
    vegaEmbed(
      '#{{ params.id }}',
      {
        $schema: "https://vega.github.io/schema/vega-lite/v5.json",
        description: {{ params.description | dump | safe }},
        width: "container",
        height: document.querySelector('#donut-card-{{ params.id }}').clientHeight,
        padding: 5,
        autosize: {
          type: "fit-x",
        },
        data: {{ params.data | dump | safe }},
        encoding: {
          theta: { field: {{ params.theta | dump | safe }}, type: "quantitative", stack: true },
          color: { field: {{ params.color | dump | safe }}, type: "nominal", legend: { direction: "vertical", orient: "right", title: {{ params.title | dump | safe }} } }
        },
        layer: [{
          mark: { type: "arc", innerRadius: document.querySelector('#donut-card-{{ params.id }}').clientWidth/4, outerRadius: document.querySelector('#donut-card-{{ params.id }}').clientWidth/4 + 20 },
        }, {
          mark: {type: "text", radius: document.querySelector('#donut-card-{{ params.id }}').clientWidth/4 + 40 }, 
          encoding: {
            text: {field: "percent", type: "nominal"}
          }
        }],
        view: { stroke: "transparent" }
      },
      { actions: false }
    );
  });
</script>
{% endmacro %}
