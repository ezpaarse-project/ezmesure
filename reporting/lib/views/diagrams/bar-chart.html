{% macro render(id) %}
<div class="card mx-1 my-3">
  <div class="card-body">
    <h5 class="card-title">Diagramme à barres</h5>
    <div class="card-text text-center">
      <div id="{{ id }}"></div>
    </div>
  </div>
</div>
<script>
  window.addEventListener('load', () => {
    vegaEmbed(
      '#{{ id }}',
      {
        "$schema": "https://vega.github.io/schema/vega-lite/v5.json",
        "description": "A simple bar chart with embedded data.",
        "height": 200,
        "width": 400,
        "autosize": "fit-x",
        "data": {
          "values": [
            { "a": "A", "b": 28 }, { "a": "B", "b": 55 }, { "a": "C", "b": 43 },
            { "a": "D", "b": 91 }, { "a": "E", "b": 81 }, { "a": "F", "b": 53 },
            { "a": "G", "b": 19 }, { "a": "H", "b": 87 }
          ]
        },
        "encoding": {
          "x": { "field": "a", "type": "nominal", "axis": { "title": "", "labelAngle": 0 } },
          "y": { "field": "b", "type": "quantitative", "axis": { "title": "", "grid": false } },
          "text": { "field": "b", "type": "quantitative" }
        },
        "layer": [{
          "mark": "bar"
        }, {
          "mark": {
            "type": "text",
            "align": "left",
            "baseline": "middle",
            "dx": -7,
            "dy": -5
          },
          "encoding": {
            "text": { "field": "b", "type": "quantitative" }
          }
        }],
        "config": {
          "view": { "stroke": "transparent" }
        }
      },
      { actions: false }
    );
  });
</script>
{% endmacro %}
