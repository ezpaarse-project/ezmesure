{% macro render(id, title, description, height, width, data) %}
<div class="card mx-1 my-3">
  <div class="card-body">
    <h5 class="card-title">{{ title }}</h5>
    <div class="card-text text-center">
      <div id="{{ id }}"></div>
    </div>
  </div>
</div>
<script>
  window.addEventListener('load', () => {
    vegaEmbed(
      '#{{ id }}',
      {
        $schema: 'https://vega.github.io/schema/vega-lite/v5.json',
        description: {{ description | dump | safe }},
        height: {{ height | dump | safe }},
        width: {{ width | dump | safe }},
        autosize: 'fit-x',
        data: {{ data | dump | safe }},
        encoding: {
          x: { field: 'a', type: 'nominal', axis: { title: '', labelAngle: 0 } },
          y: { field: 'b', type: 'quantitative', axis: { title: '', grid: false } },
          text: { field: 'b', type: 'quantitative' },
        },
        layer: [{
          mark: 'bar',
        }, {
          mark: {
            type: 'text',
            align: 'left',
            baseline: 'middle',
            dx: -7,
            dy: -5,
          },
        }],
        config: {
          view: { stroke: 'transparent' },
        },
      },
      { actions: false }
    );
  });
</script>
{% endmacro %}
