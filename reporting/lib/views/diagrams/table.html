{% macro render(title, columns, data) %}
<div class="card h-100">
  <div class="card-body align-items-center">
    <h5 class="card-title">{{ title }}</h5>
    <div class="card-text">
      <table class="table table-responsive table-sm" style="white-space: nowrap; width: 1%;">
        <thead>
          <tr>
            {% for name in columns %}
            <th scope="col" style="white-space: nowrap; width: 1%;">{{ name }}</th>
            {% endfor %}
          </tr>
        </thead>
        <tbody>
          {% for object in data %}
          <tr>
            {% for attribute in object %}
            <td style="white-space: nowrap; width: 1%;">{{ attribute }}</td>
            {% endfor %}
          </tr>
          {% endfor %}
        </tbody>
      </table>
    </div>
  </div>
</div>
{% endmacro %}
