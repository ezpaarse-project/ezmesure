{% macro render(params) %}
<div class="card h-100">
  <div class="card-body" id="s-bar-chart-card-{{ params.id }}">
    <h5 class="card-title">Diagram {{ params.title }}</h5>
    <div class="card-text">
      <div id="{{ params.id }}" style="width: 100%; height: 100%"></div>
    </div>
  </div>
</div>
<script>
  window.addEventListener('load', () => {
    vegaEmbed(
      '#{{ params.id }}',
      {
        $schema: "https://vega.github.io/schema/vega-lite/v5.json",
        description: {{ params.description | dump | safe }},
        width: "container",
        padding: 5,
        autosize: {
          type: "fit-x",
        },
        data: {{ params.data | dump | safe }},
        mark: { type: "bar", cornerRadiusTopLeft: 3, cornerRadiusTopRight: 3 },
        encoding: {
          x: {{ params.x | dump | safe }},
          y: {{ params.y | dump | safe }},
          color: {{ params.color | dump | safe }}
        },
        config: {
          view: { stroke: 'transparent' },
        },
      },
      { actions: false }
    );
  });
</script>
{% endmacro %}
