{% macro render(id, description, height, width, data) %}
<div class="card mx-1 my-3">
  <div class="card-body">
    <h5 class="card-title">Diagramme à barres</h5>
    <div class="card-text text-center">
      <div id="{{ id }}"></div>
    </div>
  </div>
</div>
<script>
  window.addEventListener('load', () => {
    vegaEmbed(
      '#{{ id }}',
      {
        "$schema": "https://vega.github.io/schema/vega-lite/v5.json",
        "description": {{ description | dump | safe }},
        "width": {{ width | dump | safe }},
        "height": {{ height | dump | safe }},
        "padding": 5,
        "autosize": "fit-x",

        "data": {{ data | dump | safe }},
        "mark": { "type": "bar", "cornerRadiusTopLeft": 3, "cornerRadiusTopRight": 3 },
        "encoding": {
          "x": { "field": "a", "type": "nominal", "axis": { "title": "", "labelAngle": 0 } },
          "y": { "field": "b", "type": "quantitative", "axis": { "title": "", "grid": false } },
          "color": { "field": "color" }
        }
      },
      { actions: false }
    );
  });
</script>
{% endmacro %}
