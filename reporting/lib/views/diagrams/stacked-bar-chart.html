{% macro render(id, title, description, height, width, data) %}
<div class="card h-100">
  <div class="card-body" id="s-bar-chart-card-{{ id }}">
    <h5 class="card-title">{{ title }}</h5>
    <div class="card-text">
      <div id="{{ id }}" style="width: 100%; height: 100%"></div>
    </div>
  </div>
</div>
<script>
  window.addEventListener('load', () => {
    vegaEmbed(
      '#{{ id }}',
      {
        $schema: "https://vega.github.io/schema/vega-lite/v5.json",
        description: {{ description | dump | safe }},
        width: "container",
        padding: 5,
        autosize: {
          type: "fit-x",
        },
        data: {{ data | dump | safe }},
        mark: { type: "bar", cornerRadiusTopLeft: 3, cornerRadiusTopRight: 3 },
        encoding: {
          x: { timeUnit: "monthdate", field: "date", type: "ordinal", axis: { title: "" } },
          y: { field: "count", type: "quantitative", axis: { title: "" } },
          color: { field: "key" }
        },
        config: {
          view: { stroke: 'transparent' },
        },
      },
      { actions: false }
    );
  });
</script>
{% endmacro %}
